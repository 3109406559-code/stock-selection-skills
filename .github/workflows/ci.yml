name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Compile scripts
        run: |
          python -m compileall scripts

      - name: Run deterministic validation
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          sys.path.insert(0, str(Path("scripts").resolve()))
          from fetch_a_share_data import merge_today_into_history

          merged_history, merged, reason = merge_today_into_history(
              [{"date": "20260320", "open": 7.0, "high": 7.5, "low": 6.9, "close": 7.4}],
              {"date": "20260323", "open": 7.5, "high": 8.0, "low": 7.4, "close": 7.9},
              intraday_summary={"is_trading": False},
          )
          assert merged is True
          assert reason == "appended_after_close"
          assert merged_history[-1]["date"] == "20260323"

          with tempfile.TemporaryDirectory() as temp_dir:
              state_file = Path(temp_dir) / "portfolio_state.json"
              subprocess.run(
                  [
                      sys.executable, "scripts/portfolio_state.py",
                      "--state-file", str(state_file),
                      "init", "--cash", "3000", "--as-of-date", "20260323", "--overwrite"
                  ],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              subprocess.run(
                  [
                      sys.executable, "scripts/portfolio_state.py",
                      "--state-file", str(state_file),
                      "buy", "000862", "--price", "8.27", "--budget", "3000",
                      "--date", "20260323", "--name", "银星能源", "--estimated"
                  ],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              proc = subprocess.run(
                  [
                      sys.executable, "scripts/portfolio_state.py",
                      "--state-file", str(state_file),
                      "show"
                  ],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              payload = json.loads(proc.stdout)
              assert payload["cash_available"] == 519.0
              assert payload["positions"][0]["ticker"] == "000862"
              assert payload["positions"][0]["shares"] == 300
          PY
